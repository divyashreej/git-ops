apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp

spec:
  replicas: 2

  selector:
    matchLabels:
      app: myapp

  template:
    metadata:
      labels:
        app: myapp

    spec:
      containers:
      - name: myapp-container
        image: IMAGE_NAME
        ports:
        - containerPort: 8080
